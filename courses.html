<!DOCTYPE html>
<html>
  <head>
    <title>iArt-Society</title>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@100..700&display=swap" rel="stylesheet">

  </head>

  <body class="courses">

    <div class="container">

      <!-- HEADER -->
      <img class="logo" src="iartsociety-header.png" alt="logo">

      <div class="introgreentext">
        <h3 class="chelsea-market-regular">
          Indian Traditional Artists & Amateurs Community
        </h3>
      </div>

      <!-- COURSES SECTION -->
      <div id="courses-container"></div>

    </div>

    <!-- ADD COURSE BUTTON -->
    <button id="add-course-btn" class="add-course-btn">
      Add Course +
    </button>

    <!-- POPUP -->
    <div id="course-popup" class="popup hidden">
  <div class="popup-content">

    <button id="close-popup-btn" class="popup-close">×</button>

    <h2>Enter Course Code</h2>

    <input
      type="text"
      id="course-code-input"
      placeholder="Enter code..."
    >

    <button id="submit-code-btn">
      Unlock Course
    </button>

  </div>
</div>

    <!-- NAV -->
    <nav class="bottom-nav">
      <a href="index.html">Home</a>
      <a href="courses.html">My Courses</a>
    </nav>

    <script src="./script.js" type="module"></script>

  </body>
</html>
